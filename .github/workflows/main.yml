name: HTML to APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert HTML to APK
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: 'www' # مسار المجلد الجديد الذي يحتوي ملفاتك
          app-name: 'NexSend'

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexSend-APK
          path: apk/
